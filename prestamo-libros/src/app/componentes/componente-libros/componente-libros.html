<div class="libro-list-container">
<h2>📚 Lista de Libros</h2>

<app-componente-filtrar [dataSource]="dataSource" label="Filtrar libros" placeholder="Buscar por título o autor"></app-componente-filtrar>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let libro">{{ libro.id }}</td>
  </ng-container>

  <!-- Portada -->
<ng-container matColumnDef="portada">
  <th mat-header-cell *matHeaderCellDef>Portada</th>
  <td mat-cell *matCellDef="let libro">
    <img class="imagen-portada" [src]="libro.portada" alt="{{libro.titulo}}">
  </td>
</ng-container>

  <!-- Título -->
  <ng-container matColumnDef="titulo">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Título</th>
    <td mat-cell *matCellDef="let libro">{{ libro.titulo }}

    </td>
  </ng-container>

  <!-- Autor -->
  <ng-container matColumnDef="autor">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Autor</th>
    <td mat-cell *matCellDef="let libro">{{ libro.autor }}</td>
  </ng-container>

  <!-- Género -->
  <ng-container matColumnDef="genero">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Género</th>
    <td mat-cell *matCellDef="let libro">{{ libro.genero }}</td>
  </ng-container>

  <!-- Año -->
  <ng-container matColumnDef="anioPublicacion">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Año</th>
    <td mat-cell *matCellDef="let libro">{{ libro.anioPublicacion }}</td>
  </ng-container>

  <!-- Disponible -->
  <ng-container matColumnDef="disponible">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Disponible</th>
    <td mat-cell *matCellDef="let libro">
      <span [style.color]="libro.disponible ? 'green' : 'red'">
        {{ libro.disponible ? 'Sí' : 'No' }}
      </span>
    </td>
  </ng-container>

  <!-- Acciones (Eliminar / Modificar) -->
  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let libro">
      <ng-container *ngIf="estaAutenticado() && esAdmin()">
        <button mat-button color="warn" (click)="eliminarLibro(libro.id)">Eliminar</button>
        <button mat-button color="primary" [routerLink]="['/libros/modificar', libro.id]">Modificar</button>
      </ng-container>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
</div>
