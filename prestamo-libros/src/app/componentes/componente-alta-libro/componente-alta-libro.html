<div class="alta-libro-container">
  <h2>Alta de Libro</h2>
  <form (ngSubmit)="altaLibro()">

    <label>ID:</label>
    <input type="number" [(ngModel)]="libro.id" name="id" required>

    <label>Título:</label>
    <input type="text" [(ngModel)]="libro.titulo" name="titulo" required>

    <label>Autor:</label>
    <input type="text" [(ngModel)]="libro.autor" name="autor" required>

    <label>Género:</label>
    <input type="text" [(ngModel)]="libro.genero" name="genero" required>

    <label>Año de publicación:</label>
    <input type="number" [(ngModel)]="libro.anioPublicacion" name="anioPublicacion" required>

    <label>Disponible:</label>
    <select [(ngModel)]="libro.disponible" name="disponible">
      <option [ngValue]="true">Sí</option>
      <option [ngValue]="false">No</option>
    </select>

    <label>Portada (URL):</label>
    <input type="text" [(ngModel)]="libro.portada" name="portada">

    <label>Resumen:</label>
    <textarea [(ngModel)]="libro.resumen" name="resumen"></textarea>

    <button type="submit">Dar de alta</button>
  </form>
</div>
